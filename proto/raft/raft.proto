syntax = "proto3";

package raft;

option go_package = "github.com/mehdiakiki/raft-core/gen/raft";

// ── Peer-to-peer Raft RPCs (Ongaro & Ousterhout §5.2, §5.3) ─────────────────

message RequestVoteArgs {
  int64  term           = 1; // candidate's term
  string candidate_id   = 2; // candidate requesting vote
  int64  last_log_index = 3; // index of candidate's last log entry (§5.4.1)
  int64  last_log_term  = 4; // term of candidate's last log entry  (§5.4.1)
}

message RequestVoteReply {
  int64 term         = 1; // currentTerm, for candidate to update itself
  bool  vote_granted = 2; // true means candidate received vote
}

// ── Pre-Vote RPCs (§3.1, "Preventing Disruptions When a Server Rejoins") ─────
// A candidate sends PreVote before incrementing its term to avoid disrupting
// the cluster if it is partitioned.  Voters grant a pre-vote only if they
// would grant a real vote AND have not heard from a leader recently.

message PreVoteArgs {
  int64  next_term      = 1; // term the candidate would use if it starts a real election
  string candidate_id   = 2;
  int64  last_log_index = 3;
  int64  last_log_term  = 4;
}

message PreVoteReply {
  int64 term         = 1; // currentTerm of the voter
  bool  vote_granted = 2;
}

// LogEntryType distinguishes normal client commands from internal no-op entries.
// §8: A new leader appends a no-op entry to commit entries from previous terms.
// §6 (joint consensus): LOG_ENTRY_CONFIG carries a serialised ClusterConfig for
// membership changes that are committed via the Raft log.
enum LogEntryType {
  LOG_ENTRY_COMMAND = 0; // default: a normal client command
  LOG_ENTRY_NOOP    = 1; // internal no-op used by leader on election
  LOG_ENTRY_CONFIG  = 2; // membership change (serialised ClusterConfig in config_data)
}

message LogEntry {
  int64        term         = 1;
  LogEntryType type         = 2;
  string       command      = 3;
  string       client_id    = 4; // originating client (empty for internal entries)
  int64        sequence_num = 5; // per-client monotonic sequence number
  bytes        config_data  = 6; // JSON-encoded ClusterConfig for LOG_ENTRY_CONFIG entries
}

message AppendEntriesArgs {
  int64           term           = 1; // leader's term
  string          leader_id      = 2; // so follower can redirect clients
  int64           prev_log_index = 3; // index of log entry immediately before new ones
  int64           prev_log_term  = 4; // term of prevLogIndex entry
  repeated LogEntry entries      = 5; // log entries to store (empty for heartbeat)
  int64           leader_commit  = 6; // leader's commitIndex
}

message AppendEntriesReply {
  int64 term           = 1; // currentTerm, for leader to update itself
  bool  success        = 2; // true if follower contained entry matching prevLog
  // Fast log backtracking optimisation (§5.3 last paragraph)
  int64 conflict_index = 3; // first index of the conflicting term
  int64 conflict_term  = 4; // term of the conflicting entry (-1 if none)
}

// ── Gateway observability ────────────────────────────────────────────────────

message GetStateRequest {
  string node_id = 1;
}

message NodeStateReply {
  string            node_id      = 1;
  string            state        = 2; // "FOLLOWER" | "CANDIDATE" | "LEADER" | "DEAD"
  int64             current_term = 3;
  string            voted_for    = 4;
  int64             commit_index = 5;
  int64             last_applied = 6;
  repeated LogEntry log         = 7;
  string            leader_id   = 8;
  // Leader replication state (§5.3, Figure 2).  Empty for non-leaders.
  map<string, int64> next_index  = 9;
  map<string, int64> match_index = 10;
  // Timing telemetry used by the frontend to interpolate animation locally.
  // Values are raw protocol timings (no visualization scaling applied).
  int64 heartbeat_interval_ms = 11;
  int64 election_timeout_ms   = 12;
  // Monotonic protocol counters for diagnostics and monitoring.
  ProtocolMetrics metrics = 13;
}

message ProtocolMetrics {
  int64 elections_started      = 1;
  int64 elections_won          = 2;
  int64 commands_submitted     = 3;
  int64 commands_applied       = 4;
  int64 log_entries_replicated = 5;
  int64 read_index_requests    = 6;
}

message WatchStateRequest {} // streams state updates until the context is cancelled

message NodeStateUpdate {
  NodeStateReply state = 1;
}

// ── Linearizable reads (§8, ReadIndex protocol) ──────────────────────────────
// ReadIndex is called by clients to obtain a safe read index.
// The leader confirms quorum and waits until applied >= readIndex before responding.

// ConsistencyLevel controls the freshness guarantee for a ReadIndex request.
enum ConsistencyLevel {
  // LINEARIZABLE sends a heartbeat quorum round before serving the read (§8).
  // Default when the field is absent.
  LINEARIZABLE  = 0;
  // LEADER_LOCAL skips the heartbeat round; low latency but slightly relaxed.
  LEADER_LOCAL   = 1;
  // ANY returns the local lastApplied immediately; may be stale.
  ANY            = 2;
}

message ReadIndexRequest {
  string           read_id     = 1; // unique read request identifier (UUID recommended)
  ConsistencyLevel consistency = 2; // default LINEARIZABLE
}

message ReadIndexReply {
  bool   success     = 1; // false if this node is not the leader
  string leader_id   = 2; // redirect hint when success=false
  int64  read_index  = 3; // safe index: state machine reflects all entries up to this index
}

// ── Gateway commands ─────────────────────────────────────────────────────────

message SubmitCommandRequest {
  string command      = 1;
  string client_id    = 2; // unique client identifier; empty = no deduplication
  int64  sequence_num = 3; // per-client monotonic counter (0 = no deduplication)
}

message SubmitCommandReply {
  bool   success      = 1;
  string leader_id    = 2; // redirect hint when this node is not the leader
  bool   duplicate    = 3; // true when this is a detected duplicate request
  bool   committed    = 4; // true when entry is known applied to state machine
  string result       = 5; // cached/apply result (best-effort string representation)
}

message SetAliveRequest {
  bool alive = 1; // false = simulate node failure; true = restart
}

message SetAliveReply {
  bool alive = 1;
}

// ── Snapshot installation (chunked transfer) ────────────────────────────────
// The leader streams snapshot data in fixed-size chunks so that large snapshots
// do not exhaust gRPC message size limits.  Configuration is only present in
// the first chunk (offset == 0).

message ClusterMemberProto {
  string id   = 1; // peer identifier
  int32  role = 2; // 0 = Voter, 1 = NonVoter
}

message ClusterConfigProto {
  repeated ClusterMemberProto members = 1;
}

message InstallSnapshotArgs {
  int64             term          = 1; // leader's term
  string            leader_id     = 2;
  int64             last_index    = 3; // last log index included in the snapshot
  int64             last_term     = 4; // term of last_index
  int64             offset        = 5; // byte offset of this chunk within the snapshot
  bytes             data          = 6; // raw chunk payload
  bool              done          = 7; // true when this is the final chunk
  ClusterConfigProto configuration = 8; // cluster membership (present only when offset==0)
}

message InstallSnapshotReply {
  int64 term    = 1; // currentTerm, for leader to update itself
  bool  success = 2;
}

// ── Service definition ───────────────────────────────────────────────────────

service RaftService {
  // Peer-to-peer Raft RPCs
  rpc RequestVote      (RequestVoteArgs)      returns (RequestVoteReply);
  rpc AppendEntries    (AppendEntriesArgs)    returns (AppendEntriesReply);
  rpc PreVote          (PreVoteArgs)          returns (PreVoteReply);
  rpc InstallSnapshot  (InstallSnapshotArgs)  returns (InstallSnapshotReply);

  // Gateway observability
  rpc GetState  (GetStateRequest)  returns (NodeStateReply);
  rpc WatchState(WatchStateRequest) returns (stream NodeStateUpdate);

  // Gateway commands
  rpc SubmitCommand (SubmitCommandRequest) returns (SubmitCommandReply);
  rpc SetAlive      (SetAliveRequest)      returns (SetAliveReply);

  // Linearizable reads
  rpc ReadIndex (ReadIndexRequest) returns (ReadIndexReply);
}
